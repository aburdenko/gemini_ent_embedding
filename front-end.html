<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Content Generator</title>
    <style>
        body { font-family: sans-serif; margin: 2em; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: auto; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #202124; }
        textarea { width: 100%; box-sizing: border-box; min-height: 120px; margin-bottom: 15px; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #287ae6; }
        .spinner { display: none; margin-top: 15px; color: #5f6368; }
        #response { margin-top: 20px; padding: 20px; background-color: #f1f3f4; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Gemini-Powered Content Generation</h1>
        <p>Use Gemini to generate creative and engaging content for your campaigns.</p>
        <textarea id="prompt_text" placeholder="e.g., Write a marketing slogan for a new coffee brand"></textarea>
        <button onclick="generateContent()">Generate Content</button>
        <div class="spinner" id="spinner">Gemini is thinking...</div>
        <div id="response"></div>
    </div>

    <iframe
        src="http://localhost:8000/"
        style="width: 100%; height: 600px; border: 1px solid #dee2e6; border-radius: 8px;"
        title="Gemini Enterprise Embedding Demo"
        sandbox="allow-scripts allow-same-origin allow-forms">
    </iframe>

    <script>
        async function generateContent() {
            const prompt = document.getElementById('prompt_text').value;
            const responseContainer = document.getElementById('response');
            const spinner = document.getElementById('spinner');

            if (!prompt) {
                alert("Please enter a prompt.");
                return;
            }

            responseContainer.innerHTML = '';
            spinner.style.display = 'block';

            // --- Placeholder for Vertex AI API Call ---
            // In a real application, you would make a secure call to a backend service.
            // This backend service would then interact with the Vertex AI SDK.
            // For this prototype, we'll simulate a network request and a generated response.
            setTimeout(() => {
                const generatedText = `This is a simulated response for the prompt: "${prompt}". In a live environment, this text would be generated by the Gemini model based on your prompt, running on Google Cloud's Vertex AI platform.`;
                responseContainer.innerHTML = \`<h3>Generated Content:</h3><p>\${generatedText}</p>\`;
                spinner.style.display = 'none';
            }, 2000); // Simulate a 2-second delay
        }
    </script>
</body>
</html>
